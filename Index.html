<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TerraScan — Upload Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
  html, body { height: 100%; }
  body {
    background: #1a1a1a;
    font-family: 'Roboto', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  #stage {
    position: relative;
  }
  #phone {
    position: relative;
    width: 388px;
    height: 884px;
    background: linear-gradient(150deg, #2a2c30 0%, #0c0d0f 55%, #1c1d20 100%);
    border-radius: 56px;
    padding: 0 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    box-shadow: 0 0 0 2px #050506, 0 26px 60px rgba(0,0,0,0.6), inset 0 0 3px rgba(255,255,255,0.18);
    transform-origin: center center;
  }
  /* side buttons */
  #phone::before {
    content: '';
    position: absolute;
    left: -3px;
    top: 188px;
    width: 3px;
    height: 96px;
    background: #18191b;
    border-radius: 3px 0 0 3px;
  }
  #phone::after {
    content: '';
    position: absolute;
    right: -3px;
    top: 170px;
    width: 3px;
    height: 64px;
    background: #18191b;
    border-radius: 0 3px 3px 0;
  }
  /* top bezel (camera) */
  #topbezel {
    flex: 0 0 auto;
    width: 100%;
    height: 41px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #camera {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #050506;
    box-shadow: inset 0 0 2px rgba(90,100,130,0.6), 0 0 0 1px rgba(255,255,255,0.04);
  }
  /* bottom bezel */
  #botbezel {
    flex: 0 0 auto;
    width: 100%;
    height: 41px;
  }
  #device {
    position: relative;
    flex: 0 0 auto;
    width: 360px;
    height: 802px;
    background: #ffffff;
    overflow: hidden;
    border-radius: 34px;
  }
  .msym {
    font-family: 'Material Symbols Outlined';
    font-weight: normal;
    font-style: normal;
    line-height: 1;
    letter-spacing: normal;
    text-transform: none;
    display: inline-block;
    white-space: nowrap;
    word-wrap: normal;
    direction: ltr;
    -webkit-font-feature-settings: 'liga';
    -webkit-font-smoothing: antialiased;
    user-select: none;
  }
  .msym.rnd { font-family: 'Material Symbols Rounded'; }
  .tap { cursor: pointer; }
  .tap:active { opacity: 0.85; }
  @keyframes tspin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div id="stage">
    <div id="phone">
      <div id="topbezel"><div id="camera"></div></div>
      <div id="device">
        <div id="root"></div>
      </div>
      <div id="botbezel"></div>
    </div>
  </div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="app/icons.jsx"></script>
  <script type="text/babel" src="app/chrome.jsx"></script>
  <script type="text/babel" src="app/modals.jsx"></script>
  <script type="text/babel" src="app/modals2.jsx"></script>
  <script type="text/babel" src="app/main.jsx"></script>
  <script>
    // Scale phone so the WHOLE device (bezel + screen) always fits, never cropped
    function fitDevice() {
      const stage = document.getElementById('stage');
      const phone = document.getElementById('phone');
      const W = 388, H = 884;
      // leave breathing room; cap height at 95vh and width at 95vw
      const sy = (window.innerHeight * 0.95) / H;
      const sx = (window.innerWidth * 0.95) / W;
      const s = Math.min(sx, sy);
      phone.style.transform = 'scale(' + s + ')';
      stage.style.width = (W * s) + 'px';
      stage.style.height = (H * s) + 'px';
    }
    window.addEventListener('resize', fitDevice);
    fitDevice();
  </script>
</body>
</html>
